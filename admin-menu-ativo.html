<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>Menu Ativo - Admin</title>
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="css/admin.css">
</head>
<body>
  <div id="admin-app">
    <div class="admin-panel">
      <div class="admin-header-row">
        <h1 id="page-title">Menu Ativo</h1>
        <button type="button" class="btn-secondary btn-sm" id="btn-renomear" hidden title="Renomear este template">Renomear</button>
      </div>
      <nav class="admin-nav" id="nav-bar">
        <a href="admin-dashboard.html" title="Voltar para a lista de templates salvos">Templates</a>
        <a href="admin.html" id="nav-pedidos" title="Ver e gerenciar pedidos dos clientes">Pedidos</a>
        <button type="button" id="btn-logout" title="Sair da conta admin">Sair</button>
      </nav>

      <div class="mass-actions">
        <button type="button" class="btn-secondary btn-sm" id="btn-marcar-todos" title="Ativar todos os items do catalogo">Marcar Todos</button>
        <button type="button" class="btn-secondary btn-sm" id="btn-desmarcar-todos" title="Desativar todos os items">Desmarcar Todos</button>
        <button type="button" class="btn-secondary btn-sm" id="btn-restaurar-precos" title="Restaurar todos os precos ao valor padrao do catalogo">Restaurar Precos</button>
        <button type="button" class="btn-secondary btn-sm" id="btn-add-item" title="Criar um novo item no catalogo">+ Novo Item</button>
      </div>

      <div id="loading" class="admin-loading">Carregando...</div>
      <p id="feedback" class="admin-feedback" hidden></p>

      <div id="menu-container"></div>

      <div class="admin-actions" style="margin-top:1rem;">
        <button type="button" class="btn-primary" id="btn-salvar" disabled title="Salvar as alteracoes feitas">Salvar</button>
        <button type="button" class="btn-primary" id="btn-usar-este" hidden title="Ativar este template como menu do cliente">Usar Este</button>
      </div>
    </div>
  </div>

  <!-- Modal Editar/Criar Item -->
  <div id="modal-item" class="modal-overlay hidden">
    <div class="modal-box modal-box-large">
      <h2 id="modal-item-titulo">Novo Item</h2>

      <!-- Abas de idioma -->
      <div class="lang-tabs">
        <button type="button" class="lang-tab ativo" data-tab="pt">🇧🇷 Português</button>
        <button type="button" class="lang-tab" data-tab="ja">🇯🇵 日本語</button>
        <button type="button" class="lang-tab" data-tab="en">🇺🇸 English</button>
      </div>

      <!-- Aba PT -->
      <div id="tab-pt" class="tab-content">
        <label for="item-nome">Nome *</label>
        <input type="text" id="item-nome" placeholder="Ex: Pastel de Carne">
        <label for="item-desc-pt">Descrição <small style="color:#999;">opcional</small></label>
        <textarea id="item-desc-pt" placeholder="Descrição em português"></textarea>
        <label for="item-ing-pt">Ingredientes <small style="color:#999;">separados por vírgula</small></label>
        <input type="text" id="item-ing-pt" placeholder="Carne moída, Cebola, Temperos">
        <button type="button" id="btn-auto-traduzir" class="btn-translate">
          🔄 Auto-traduzir para JP e EN
        </button>
        <p id="translate-status" style="font-size:0.82rem;margin-top:6px;display:none;"></p>
      </div>

      <!-- Aba JA -->
      <div id="tab-ja" class="tab-content" hidden>
        <p style="font-size:0.8rem;color:#888;margin-bottom:0.5rem;">Preenchido automaticamente pelo botão de tradução. Você pode editar.</p>
        <label for="item-nome-ja">Nome</label>
        <input type="text" id="item-nome-ja" placeholder="Ex: 牛肉パステル">
        <label for="item-desc-ja">Descrição</label>
        <textarea id="item-desc-ja" placeholder="説明文"></textarea>
        <label for="item-ing-ja">Ingredientes</label>
        <input type="text" id="item-ing-ja" placeholder="牛ひき肉, 玉ねぎ, スパイス">
      </div>

      <!-- Aba EN -->
      <div id="tab-en" class="tab-content" hidden>
        <p style="font-size:0.8rem;color:#888;margin-bottom:0.5rem;">Filled automatically by the translate button. You can edit.</p>
        <label for="item-nome-en">Name</label>
        <input type="text" id="item-nome-en" placeholder="Ex: Beef Pastel">
        <label for="item-desc-en">Description</label>
        <textarea id="item-desc-en" placeholder="Description in English"></textarea>
        <label for="item-ing-en">Ingredients</label>
        <input type="text" id="item-ing-en" placeholder="Ground beef, Onion, Spices">
      </div>

      <label for="item-preco">Preco padrao (yen)</label>
      <input type="number" id="item-preco" min="1" step="1" placeholder="500">

      <label>Foto</label>
      <div class="foto-upload-row">
        <img id="item-foto-preview" class="foto-preview" src="" alt="" hidden>
        <input type="file" id="item-foto-file" accept="image/*" style="display:none;">
        <button type="button" class="btn-secondary btn-sm" id="btn-upload-foto">Carregar Foto</button>
        <span id="foto-nome" style="font-size:0.8rem;color:#888;"></span>
      </div>

      <label for="item-categoria">Categoria</label>
      <select id="item-categoria"></select>

      <label>Alergenicos (obrigatorios no Japao marcados com *)</label>
      <div class="allergen-grid" id="allergen-grid"></div>

      <div class="modal-checkbox-row">
        <input type="checkbox" id="item-popular">
        <label for="item-popular">Marcar como Popular</label>
      </div>

      <div class="modal-buttons">
        <button type="button" class="btn-secondary" id="btn-item-cancel">Cancelar</button>
        <button type="button" class="btn-primary" id="btn-item-save">Salvar Item</button>
      </div>
    </div>
  </div>

  <script src="js/config.js"></script>
  <script type="module" src="js/admin-menu-ativo.js"></script>
</body>
</html>
